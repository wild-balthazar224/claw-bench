# Production deployment for Claw Bench
# Usage: docker compose -f docker/docker-compose.prod.yml up -d
#
# Minimum server: 2 vCPU / 4GB RAM / 40GB SSD
# The benchmark runs on users' local machines; this server only
# hosts the static leaderboard, skill.md, and optional result API.

services:
  # ── Claw Bench API Server ──────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - EXPERT_PASSWORD=${EXPERT_PASSWORD:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - TASK_GEN_MODEL=${TASK_GEN_MODEL:-}
    volumes:
      - cache-data:/var/claw-bench/cache
      - results-data:/var/claw-bench/results
      - ../data:/app/data
      - ../tasks:/app/tasks:ro
      - ../skills:/app/skills:ro
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy + Static Frontend ─────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../leaderboard/out:/usr/share/nginx/html:ro
      - ./ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      - server
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

volumes:
  cache-data:
  results-data:
